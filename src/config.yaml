# 记牌器配置文件
# 修改后重启程序生效。


# ---------------------------------------------------------------------------
# 区域坐标
# ---------------------------------------------------------------------------
# 所有坐标均为相对于游戏窗口的比例值（0.0 到 1.0），而非像素值。
# 例如 0.5 表示窗口宽度/高度的正中间。
# 格式：[[左上角x, 左上角y], [右下角x, 右下角y]]

# 模板缩放比例，1.0 表示不缩放（默认）。
REGIONS:
  playing_left: [[0.1388, 0.3233], [0.3956, 0.4256]]              # 左侧玩家出牌区域
  playing_middle: [[0.1506, 0.4667], [0.7006, 0.6133]]            # 自己出牌区域
  playing_right: [[0.3956, 0.3244], [0.6531, 0.4256]]             # 右侧玩家出牌区域
  my_cards: [[0.1506, 0.7044], [0.7006, 0.8378]]                  # 自己的手牌区域
  remaining_cards_left: [[0.0019, 0.52], [0.0638, 0.5978]]        # 左侧玩家剩余牌数显示区域（含地主标记）
  remaining_cards_middle: [[0.4456, 0.8489], [0.5069, 0.9244]]    # 自己剩余牌数显示区域（含地主标记）
  remaining_cards_right: [[0.7531, 0.5201], [0.8213, 0.6044]]     # 右侧玩家剩余牌数显示区域（含地主标记）
  three_displayed_cards: [[0.3056, 0.0956], [0.5212, 0.1778]]     # 游戏结束时顶部显示的底牌区域


# ---------------------------------------------------------------------------
# 识别阈值
# ---------------------------------------------------------------------------
# 所有阈值均为 0.0 到 1.0 之间的置信度，越高要求匹配越精确。
# 如果出现漏识别（明明有牌却没识别到），可以适当调低对应阈值。
# 如果出现误识别（把背景识别成牌），可以适当调高。

THRESHOLDS:
  card: 0.80      # 卡牌识别阈值。主要影响出牌识别，通常不需要调整。
  landlord: 0.90  # 地主"[ 20 张 ]"文字识别阈值。影响游戏开始检测和地主判断。
  warning: 0.90   # 警告弹窗检测阈值。检测到时跳过该帧，避免弹窗遮挡导致误识别。


# ---------------------------------------------------------------------------
# 时间间隔（单位：秒）
# ---------------------------------------------------------------------------

SCREENSHOT_INTERVAL: 0.5   # 游戏进行中每次截图的间隔。越小响应越快，但 CPU 占用越高。
GAME_START_INTERVAL: 1.0   # 等待游戏开始时的轮询间隔。游戏还没开始时每隔多久检测一次。


# ---------------------------------------------------------------------------
# 游戏窗口标题
# ---------------------------------------------------------------------------
# 程序通过窗口标题定位游戏窗口，从而只截取游戏区域而非整个屏幕。
# 如果程序无法找到游戏窗口，请打开任务管理器查看游戏进程的窗口标题，
# 然后把下面的值改成实际标题（或标题的一部分）。

GAME_WINDOW_TITLE: "斗地主"


# ---------------------------------------------------------------------------
# 首次启动标志
# ---------------------------------------------------------------------------
# 程序首次启动时会自动显示区域调整叠加层，方便用户校准各区域边界。
# 校准完成后此值会自动改为 false，之后可按热键 c 手动显示/隐藏叠加层。

IS_FIRST_LAUNCH: true


# ---------------------------------------------------------------------------
# 记牌器窗口位置
# ---------------------------------------------------------------------------
# 程序启动后窗口可以用鼠标拖动，这里配置的是初始位置。
#
# 每个窗口支持两种定位方式，二选一（同时设置时 OFFSET 优先）：
#   OFFSET_X / OFFSET_Y：窗口左上角距屏幕左上角的像素距离
#   CENTER_X / CENTER_Y：窗口中心点距屏幕左上角的像素距离
#
# X 和 Y 可以分别用不同方式：例如只设 CENTER_X 不设 OFFSET_X，
# 则 X 方向用居中定位，Y 方向默认为 0（紧贴屏幕顶部）。
#
# DISPLAY：是否显示该窗口（True/False）。
# OPACITY：窗口不透明度，1.0 为完全不透明，0.0 为完全透明。
# FONT_SIZE：标签字体大小（像素）。

GUI:
  MAIN: # 主记牌器（横排，显示所有牌的剩余数量）
    DISPLAY: true
    OPACITY: 1
    FONT_SIZE: 25
    OFFSET_Y: 0       # 紧贴屏幕顶部
    CENTER_X: 700     # 水平居中在 x=700 处

  LEFT: # 上家记牌器（竖排，显示上家出过的牌）
    DISPLAY: true
    OPACITY: 0.9
    FONT_SIZE: 18
    CENTER_X: 181
    CENTER_Y: 456

  RIGHT: # 下家记牌器（竖排，显示下家出过的牌）
    DISPLAY: true
    OPACITY: 0.9
    FONT_SIZE: 18
    OFFSET_X: 1426    # 紧靠屏幕右侧
    CENTER_Y: 456

  SWITCH: # 开关窗口（打开/关闭记牌器的控制面板）
    FONT_SIZE: 12
    OFFSET_X: 1200
    OFFSET_Y: 0


# ---------------------------------------------------------------------------
# 热键
# ---------------------------------------------------------------------------
# 在任意记牌器窗口获得焦点时按下对应按键触发。
# 值为单个字母或数字，不支持组合键。

HOTKEYS:
  QUIT: q        # 退出程序
  OPEN_LOG: l    # 打开最新日志文件
  OPEN_CONFIG: o # 打开此配置文件
  RESET: r       # 重置记牌器（重新开始等待游戏）
  TOGGLE_OVERLAY: c # 显示/隐藏区域调整叠加层


# ---------------------------------------------------------------------------
# 日志
# ---------------------------------------------------------------------------

LOG_LEVEL: INFO   # 日志级别：TRACE / DEBUG / INFO / SUCCESS / WARNING / ERROR / CRITICAL
# 调试时改为 DEBUG 可以看到每帧的识别置信度。
LOG_RETENTION: 3  # 日志保留天数，超出的旧日志文件自动删除。
